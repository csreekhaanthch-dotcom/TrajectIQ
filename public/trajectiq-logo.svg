<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient for the trajectory -->
    <linearGradient id="trajectoryGradient" x1="0%" y1="100%" y2="0%" x2="100%">
      <stop offset="0%" stop-color="#1E1F4F"/>
      <stop offset="50%" stop-color="#2962FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    
    <!-- Neon accent gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2962FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E1F4F" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Trajectory Mark Symbol -->
  <g transform="translate(20, 20)" filter="url(#shadow)">
    <!-- Main trajectory path forming subtle "T" -->
    <!-- Vertical stroke of T (rising trajectory) -->
    <path 
      d="M20 70 L20 25 Q20 15 30 15 L45 15"
      stroke="url(#trajectoryGradient)" 
      stroke-width="4" 
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    
    <!-- Horizontal stroke of T (evaluation baseline) -->
    <path 
      d="M8 15 L62 15"
      stroke="url(#trajectoryGradient)" 
      stroke-width="3" 
      stroke-linecap="round"
      fill="none"
      opacity="0.6"
    />
    
    <!-- Rising trajectory curve -->
    <path 
      d="M20 70 Q25 55 35 45 Q45 35 55 20 Q60 12 68 8"
      stroke="url(#neonGradient)" 
      stroke-width="3.5" 
      stroke-linecap="round"
      fill="none"
      filter="url(#glow)"
    />
    
    <!-- Data nodes along the trajectory -->
    <!-- Node 1 - Start point (larger, base) -->
    <circle cx="20" cy="70" r="5" fill="#1E1F4F"/>
    <circle cx="20" cy="70" r="3" fill="#2962FF"/>
    
    <!-- Node 2 - First data point -->
    <circle cx="35" cy="45" r="4" fill="#2962FF"/>
    <circle cx="35" cy="45" r="2" fill="white" opacity="0.8"/>
    
    <!-- Node 3 - Second data point -->
    <circle cx="55" cy="20" r="4" fill="#00D4FF"/>
    <circle cx="55" cy="20" r="2" fill="white" opacity="0.9"/>
    
    <!-- Node 4 - Peak/Apex (accent, glowing) -->
    <circle cx="68" cy="8" r="5" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="68" cy="8" r="3" fill="white"/>
    
    <!-- Small accent nodes for intelligence signals -->
    <circle cx="28" cy="58" r="2" fill="#2962FF" opacity="0.6"/>
    <circle cx="45" cy="32" r="2" fill="#00D4FF" opacity="0.7"/>
  </g>
  
  <!-- Typography: TrajectIQ -->
  <g transform="translate(105, 35)">
    <!-- "Traject" in Deep Indigo -->
    <text 
      x="0" 
      y="32" 
      font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
      font-size="32" 
      font-weight="600"
      letter-spacing="-0.5"
      fill="#1E1F4F"
    >
      Traject
    </text>
    
    <!-- "IQ" differentiated with gradient -->
    <text 
      x="140" 
      y="32" 
      font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
      font-size="32" 
      font-weight="700"
      letter-spacing="-0.5"
      fill="url(#neonGradient)"
    >
      IQ
    </text>
    
    <!-- Tagline -->
    <text 
      x="0" 
      y="55" 
      font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
      font-size="12" 
      font-weight="400"
      letter-spacing="0.5"
      fill="#64748B"
    >
      Intelligence-Driven Hiring
    </text>
  </g>
</svg>
