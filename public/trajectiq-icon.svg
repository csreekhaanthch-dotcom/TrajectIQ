<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient for the trajectory -->
    <linearGradient id="trajectoryGradient" x1="0%" y1="100%" y2="0%" x2="100%">
      <stop offset="0%" stop-color="#1E1F4F"/>
      <stop offset="50%" stop-color="#2962FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    
    <!-- Neon accent gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2962FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (optional for icon) -->
  <circle cx="32" cy="32" r="30" fill="white" opacity="0.95"/>
  
  <!-- Trajectory Mark Symbol -->
  <g transform="translate(8, 8)">
    <!-- Vertical stroke forming subtle T -->
    <path 
      d="M16 48 L16 12 Q16 6 22 6 L36 6"
      stroke="url(#trajectoryGradient)" 
      stroke-width="4" 
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    
    <!-- Horizontal baseline of T -->
    <path 
      d="M6 6 L42 6"
      stroke="url(#trajectoryGradient)" 
      stroke-width="3" 
      stroke-linecap="round"
      fill="none"
      opacity="0.4"
    />
    
    <!-- Rising trajectory curve -->
    <path 
      d="M16 48 Q20 38 26 30 Q34 20 42 10 Q46 5 50 2"
      stroke="url(#neonGradient)" 
      stroke-width="3.5" 
      stroke-linecap="round"
      fill="none"
      filter="url(#glow)"
    />
    
    <!-- Data nodes along the trajectory -->
    <!-- Node 1 - Start point -->
    <circle cx="16" cy="48" r="4" fill="#1E1F4F"/>
    <circle cx="16" cy="48" r="2.5" fill="#2962FF"/>
    
    <!-- Node 2 - Mid trajectory -->
    <circle cx="26" cy="30" r="3.5" fill="#2962FF"/>
    <circle cx="26" cy="30" r="1.5" fill="white" opacity="0.8"/>
    
    <!-- Node 3 - Upper trajectory -->
    <circle cx="42" cy="10" r="3.5" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="42" cy="10" r="1.5" fill="white" opacity="0.9"/>
    
    <!-- Node 4 - Apex (accent) -->
    <circle cx="50" cy="2" r="4" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="50" cy="2" r="2" fill="white"/>
    
    <!-- Small signal nodes -->
    <circle cx="22" cy="40" r="1.5" fill="#2962FF" opacity="0.5"/>
    <circle cx="34" cy="20" r="1.5" fill="#00D4FF" opacity="0.6"/>
  </g>
</svg>
