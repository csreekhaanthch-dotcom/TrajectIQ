<!-- Dark Mode Version -->
<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient for the trajectory - brighter for dark mode -->
    <linearGradient id="trajectoryGradientDark" x1="0%" y1="100%" y2="0%" x2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    
    <!-- Neon accent gradient -->
    <linearGradient id="neonGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Trajectory Mark Symbol -->
  <g transform="translate(20, 20)">
    <!-- Main trajectory path forming subtle "T" -->
    <path 
      d="M20 70 L20 25 Q20 15 30 15 L45 15"
      stroke="url(#trajectoryGradientDark)" 
      stroke-width="4" 
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    
    <!-- Horizontal stroke of T -->
    <path 
      d="M8 15 L62 15"
      stroke="url(#trajectoryGradientDark)" 
      stroke-width="3" 
      stroke-linecap="round"
      fill="none"
      opacity="0.5"
    />
    
    <!-- Rising trajectory curve -->
    <path 
      d="M20 70 Q25 55 35 45 Q45 35 55 20 Q60 12 68 8"
      stroke="url(#neonGradientDark)" 
      stroke-width="3.5" 
      stroke-linecap="round"
      fill="none"
      filter="url(#glowDark)"
    />
    
    <!-- Data nodes along the trajectory -->
    <circle cx="20" cy="70" r="5" fill="#6366F1"/>
    <circle cx="20" cy="70" r="3" fill="#818CF8"/>
    
    <circle cx="35" cy="45" r="4" fill="#818CF8"/>
    <circle cx="35" cy="45" r="2" fill="white" opacity="0.8"/>
    
    <circle cx="55" cy="20" r="4" fill="#22D3EE"/>
    <circle cx="55" cy="20" r="2" fill="white" opacity="0.9"/>
    
    <circle cx="68" cy="8" r="5" fill="#22D3EE" filter="url(#glowDark)"/>
    <circle cx="68" cy="8" r="3" fill="white"/>
    
    <circle cx="28" cy="58" r="2" fill="#818CF8" opacity="0.6"/>
    <circle cx="45" cy="32" r="2" fill="#22D3EE" opacity="0.7"/>
  </g>
  
  <!-- Typography: TrajectIQ -->
  <g transform="translate(105, 35)">
    <!-- "Traject" in white -->
    <text 
      x="0" 
      y="32" 
      font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
      font-size="32" 
      font-weight="600"
      letter-spacing="-0.5"
      fill="#F8FAFC"
    >
      Traject
    </text>
    
    <!-- "IQ" with neon gradient -->
    <text 
      x="140" 
      y="32" 
      font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
      font-size="32" 
      font-weight="700"
      letter-spacing="-0.5"
      fill="url(#neonGradientDark)"
    >
      IQ
    </text>
    
    <!-- Tagline -->
    <text 
      x="0" 
      y="55" 
      font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
      font-size="12" 
      font-weight="400"
      letter-spacing="0.5"
      fill="#94A3B8"
    >
      Intelligence-Driven Hiring
    </text>
  </g>
</svg>
