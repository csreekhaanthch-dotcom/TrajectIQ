name: Build and Release TrajectIQ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for release (e.g., 1.0.0)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r TrajectIQ/requirements.txt
          pip install pyinstaller

      - name: Generate RSA keys for license signing
        shell: python
        run: |
          import sys
          sys.path.insert(0, 'TrajectIQ')
          from pathlib import Path
          Path('TrajectIQ/tools/keys').mkdir(parents=True, exist_ok=True)
          
          # Generate RSA key pair
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend
          
          private_key = rsa.generate_private_key(
              public_exponent=65537,
              key_size=4096,
              backend=default_backend()
          )
          public_key = private_key.public_key()
          
          # Save private key
          private_pem = private_key.private_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PrivateFormat.PKCS8,
              encryption_algorithm=serialization.NoEncryption()
          )
          Path('TrajectIQ/tools/keys/private_key.pem').write_bytes(private_pem)
          
          # Save public key
          public_pem = public_key.public_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PublicFormat.SubjectPublicKeyInfo
          )
          Path('TrajectIQ/tools/keys/public_key.pem').write_bytes(public_pem)
          
          print('RSA keys generated successfully')

      - name: Build executable with PyInstaller
        run: |
          cd TrajectIQ
          pyinstaller --onefile --windowed --name "TrajectIQ" --clean --noconfirm --hidden-import=cryptography --hidden-import=cryptography.fernet --hidden-import=cryptography.hazmat.primitives --hidden-import=cryptography.hazmat.primitives.asymmetric --hidden-import=cryptography.hazmat.backends --hidden-import=bcrypt --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui --hidden-import=PyQt5.QtWidgets --add-data "tools/keys/public_key.pem;tools/keys" src/main.py
        shell: cmd

      - name: Verify build
        run: |
          if (Test-Path "TrajectIQ/dist/TrajectIQ.exe") {
            $size = (Get-Item "TrajectIQ/dist/TrajectIQ.exe").Length / 1MB
            Write-Host "Build successful! Size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "Build failed - executable not found"
            exit 1
          }
        shell: powershell

      - name: Get version
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "1.0.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
        shell: powershell

      - name: Create distribution package
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $distDir = "TrajectIQ/dist/TrajectIQ-$version"
          New-Item -ItemType Directory -Path $distDir -Force
          
          Copy-Item "TrajectIQ/dist/TrajectIQ.exe" $distDir
          Copy-Item "TrajectIQ/README.md" $distDir -ErrorAction SilentlyContinue
          Copy-Item "TrajectIQ/LICENSE" $distDir -ErrorAction SilentlyContinue
          if (Test-Path "TrajectIQ/docs") {
            Copy-Item "TrajectIQ/docs" -Destination "$distDir/docs" -Recurse
          }
          
          # Create quick start guide
          $quickStart = @"
          TrajectIQ Enterprise v$version
          ================================
          
          Quick Start:
          1. Run TrajectIQ.exe to launch the application
          2. On first run, you will see the license activation screen
          3. Click 'Show Fingerprint' to get your machine ID
          4. Contact support@trajectiq.com for license activation
          
          Command Line Options:
          - TrajectIQ.exe --version        Show version info
          - TrajectIQ.exe --fingerprint    Show machine fingerprint
          - TrajectIQ.exe --gui            Launch GUI (default)
          - TrajectIQ.exe --evaluate FILE  Evaluate a resume file
          
          Support: support@trajectiq.com
          "@
          $quickStart | Out-File -FilePath "$distDir/QUICKSTART.txt" -Encoding UTF8
          
          Compress-Archive -Path $distDir -DestinationPath "TrajectIQ/dist/TrajectIQ-$version-win-x64.zip"
          Write-Host "Package created: TrajectIQ-$version-win-x64.zip"
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrajectIQ-${{ steps.version.outputs.version }}-win-x64
          path: TrajectIQ/dist/TrajectIQ-${{ steps.version.outputs.version }}-win-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TrajectIQ Enterprise v${{ steps.version.outputs.version }}
          body: |
            ## TrajectIQ Enterprise v${{ steps.version.outputs.version }}
            
            ### Intelligence-Driven Hiring Platform
            
            **Features:**
            - Deterministic resume evaluation with multi-factor scoring
            - Enterprise-grade security (RSA license validation, encryption)
            - Role-based access control (RBAC)
            - Bias detection and fairness monitoring
            - Optional AI enhancement layer
            
            **What's Included:**
            - `TrajectIQ.exe` - Standalone Windows executable
            - Documentation and quick start guide
            
            **System Requirements:**
            - Windows 10/11 (64-bit)
            - No additional dependencies required
            
            ### Installation
            1. Download and extract the ZIP file
            2. Run `TrajectIQ.exe`
            3. Activate your license
            
            ### Support
            - Technical: support@trajectiq.com
            - License: license-support@trajectiq.com
          files: |
            TrajectIQ/dist/TrajectIQ-${{ steps.version.outputs.version }}-win-x64.zip
            TrajectIQ/dist/TrajectIQ.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libgl1-mesa-glx

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r TrajectIQ/requirements.txt
          pip install pyinstaller

      - name: Generate RSA keys
        shell: python
        run: |
          import sys
          sys.path.insert(0, 'TrajectIQ')
          from pathlib import Path
          Path('TrajectIQ/tools/keys').mkdir(parents=True, exist_ok=True)
          
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend
          
          private_key = rsa.generate_private_key(
              public_exponent=65537,
              key_size=4096,
              backend=default_backend()
          )
          public_key = private_key.public_key()
          
          private_pem = private_key.private_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PrivateFormat.PKCS8,
              encryption_algorithm=serialization.NoEncryption()
          )
          Path('TrajectIQ/tools/keys/private_key.pem').write_bytes(private_pem)
          
          public_pem = public_key.public_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PublicFormat.SubjectPublicKeyInfo
          )
          Path('TrajectIQ/tools/keys/public_key.pem').write_bytes(public_pem)
          
          print('RSA keys generated successfully')

      - name: Build executable
        run: |
          cd TrajectIQ
          pyinstaller --onefile --name "TrajectIQ" --clean --noconfirm --hidden-import=cryptography --hidden-import=cryptography.fernet --hidden-import=cryptography.hazmat.primitives --hidden-import=cryptography.hazmat.primitives.asymmetric --hidden-import=cryptography.hazmat.backends --hidden-import=bcrypt --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui --hidden-import=PyQt5.QtWidgets --add-data "tools/keys/public_key.pem:tools/keys" src/main.py

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION=${VERSION#v}
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create distribution package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIST_DIR="TrajectIQ/dist/TrajectIQ-$VERSION-linux"
          mkdir -p "$DIST_DIR"
          
          cp TrajectIQ/dist/TrajectIQ "$DIST_DIR/" 2>/dev/null || true
          cp TrajectIQ/README.md "$DIST_DIR/" 2>/dev/null || true
          cp TrajectIQ/LICENSE "$DIST_DIR/" 2>/dev/null || true
          cp -r TrajectIQ/docs "$DIST_DIR/" 2>/dev/null || true
          
          tar -czvf TrajectIQ/dist/TrajectIQ-$VERSION-linux-x64.tar.gz -C TrajectIQ/dist TrajectIQ-$VERSION-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrajectIQ-${{ steps.version.outputs.version }}-linux-x64
          path: TrajectIQ/dist/TrajectIQ-${{ steps.version.outputs.version }}-linux-x64.tar.gz
          retention-days: 30

      - name: Upload to Release
        if: ${{ github.event.inputs.create_release == 'true' || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v1
        with:
          files: TrajectIQ/dist/TrajectIQ-${{ steps.version.outputs.version }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
