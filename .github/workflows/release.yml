name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.0.2)'
        required: false
        default: '3.0.2'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 pycryptodome bcrypt PyPDF2 python-docx lxml requests

      - name: Build executable
        run: python build.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrajectIQ-Windows
          path: dist/TrajectIQ.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 pycryptodome bcrypt PyPDF2 python-docx lxml requests

      - name: Build executable
        run: python build.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrajectIQ-Linux
          path: dist/TrajectIQ

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 pycryptodome bcrypt PyPDF2 python-docx lxml requests

      - name: Build executable
        run: python build.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrajectIQ-macOS
          path: dist/TrajectIQ

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TrajectIQ-Windows
          path: dist/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TrajectIQ-Linux
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TrajectIQ-macOS
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/TrajectIQ.exe
            dist/TrajectIQ
          generate_release_notes: true
          body: |
            ## TrajectIQ ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `TrajectIQ.exe` |
            | Linux | `TrajectIQ` |
            | macOS | `TrajectIQ` (macOS) |

            ### Demo License Key
            ```
            TRAJECTIQ-DEMO-2024-FULL-ACCESS
            ```

            ### New in v3.0.1
            - ✅ Modern TrajectIQ logo and branding
            - ✅ Professional color scheme (blue gradient theme)
            - ✅ Custom favicon and app icons
            - ✅ Improved loading states and animations
            - ✅ Enhanced error handling and display
            - ✅ Fixed startup error (ATSConnector not defined)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
