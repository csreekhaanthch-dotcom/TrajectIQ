# TrajectIQ Backend Docker Compose
# Vector Search Intelligence Layer

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trajectiq-backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    volumes:
      - model_cache:/app/.cache

volumes:
  model_cache:
